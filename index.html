<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elsa Workflows — Open-source workflow engine for .NET</title>
    <meta name="description" content="Build workflow-driven .NET apps with Elsa: visual designer, C# code, and scale from small apps to enterprise systems. Open source." />
    <meta name="author" content="Elsa Workflows" />
    <meta name="keywords" content="workflow engine, .NET, C#, workflow automation, Elsa, open source, visual designer, business process" />

    <!-- Sitewide Open Graph fallback (per-route values are set via react-helmet-async) -->
    <meta property="og:title" content="Elsa Workflows — Open-source workflow engine for .NET" />
    <meta property="og:description" content="Build workflow-driven .NET apps with Elsa: visual designer, C# code, and scale from small apps to enterprise systems." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.elsa-workflows.io/" />
    <meta property="og:image" content="https://www.elsa-workflows.io/elsa-logo.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Elsa Workflows — Open-source workflow engine for .NET" />
    <meta name="twitter:description" content="Build workflow-driven .NET apps with Elsa: visual designer, C# code, and scale from small apps to enterprise systems." />
    <meta name="twitter:image" content="https://www.elsa-workflows.io/elsa-logo.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/src/assets/elsa-logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&family=Manrope:wght@400;500;600;700&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Prevent theme + preference flash on page load -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        var systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var resolvedTheme = theme === 'system' || !theme ? (systemDark ? 'dark' : 'light') : theme;
        if (resolvedTheme === 'dark') {
          document.documentElement.classList.add('dark');
        }
        try {
          var raw = localStorage.getItem('elsa.theme.prefs');
          if (raw) {
            var p = JSON.parse(raw);
            var accents = ['magenta','indigo','emerald','amber','slate'];
            var fonts = ['inter-sora','geist','manrope-sora','jetbrains-inter'];
            var flavors = ['anthracite','noir','slate'];
            if (p && accents.indexOf(p.accent) > -1) document.documentElement.setAttribute('data-accent', p.accent);
            if (p && fonts.indexOf(p.font) > -1) document.documentElement.setAttribute('data-font', p.font);
            if (p && flavors.indexOf(p.darkFlavor) > -1) document.documentElement.setAttribute('data-dark-flavor', p.darkFlavor);
          }
        } catch (e) {}
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
